name: Flaky Commit Validator

on:
  workflow_dispatch:

jobs:
  flaky-check:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false

    steps:

      ####################################################
      # CHECKOUT
      ####################################################

      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      ####################################################
      # JDK
      ####################################################

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      ####################################################
      # TARGET COMMIT
      ####################################################

      - name: Prepare commits
        run: |
          TARGET=fbd3b65034637ab2ac1b3de264d9a5600e4129dd

          echo "TARGET=$TARGET" >> $GITHUB_ENV

          PARENT=$(git rev-parse ${TARGET}^)

          echo "PARENT=$PARENT" >> $GITHUB_ENV

          echo "Parent: $PARENT"
          echo "Target: $TARGET"

      ####################################################
      # DEBUG STRUCTURE
      ####################################################

      - name: Show repo structure
        run: |
          pwd
          ls
          find . -name pom.xml | head -20

      ####################################################
      # BUILD PARENT
      ####################################################

      - name: Checkout parent
        run: |
          git checkout $PARENT

      - name: Build parent
        run: |
          cd spring-boot-project

          ./mvnw -q -DskipTests clean install

      ####################################################
      # RUN PARENT TESTS
      ####################################################

      - name: Run parent tests repeatedly
        run: |
          mkdir -p results/parent

          cd spring-boot-project

          for i in {1..3}; do
            echo "===================="
            echo "PARENT RUN $i"
            echo "===================="

            ./mvnw test \
              > ../results/parent/run_$i.log 2>&1

            echo $? >> ../results/parent/status.txt
          done

      ####################################################
      # BUILD TARGET
      ####################################################

      - name: Checkout target
        run: |
          git checkout $TARGET

      - name: Build target
        run: |
          cd spring-boot-project

          ./mvnw -q -DskipTests clean install

      ####################################################
      # RUN TARGET TESTS
      ####################################################

      - name: Run target tests repeatedly
        run: |
          mkdir -p results/target

          cd spring-boot-project

          for i in {1..3}; do
            echo "===================="
            echo "TARGET RUN $i"
            echo "===================="

            ./mvnw test \
              > ../results/target/run_$i.log 2>&1

            echo $? >> ../results/target/status.txt
          done

      ####################################################
      # ANALYZE
      ####################################################

      - name: Compare results
        run: |
          echo "===== PARENT ====="
          cat results/parent/status.txt || true

          echo "===== TARGET ====="
          cat results/target/status.txt || true

      ####################################################
      # UPLOAD RESULTS
      ####################################################

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: flaky-results
          path: results/
